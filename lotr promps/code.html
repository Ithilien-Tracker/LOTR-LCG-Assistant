<!DOCTYPE html>
<html>
	<head>
		<title>App Menu</title>
		<link rel="stylesheet" href="styles.css">
	</head>
	
	<body>
		<div id="app">
			<!-- MAIN MENU -->
			<div class="screen active" id="mainMenu">
				<h1>Main Menu</h1>
				<button onclick="showScreen('settings')">Settings</button>
				<button onclick="showScreen('profile')">Profile</button>
				<button onclick="openModal()">Open Sub Menu</button>
			</div>
			
			<!-- SETTINGS SCREEN -->
			<div class="screen" id="settings">
				<h1>Settings</h1>
				<button onclick="showScreen('mainMenu')">Back</button>
			</div>
			
			<!-- PROFILE SCREEN -->
			<div class="screen" id="profile">
				<h1>Profile</h1>
				<button onclick="showScreen('mainMenu')">Back</button>
			</div>
		</div>
		
		<!-- MODAL SUBMENU -->
		<div id="modal" class="modal hidden">
			<div class="modal-content">
				<h2>Sub Menu</h2>
				<button>Option 1</button>
				<button>Option 2</button>
				<button onclick="closeModal()">Close</button>
			</div>
		</div>
		<script src="app.js"></script>
	</body>
</html>
